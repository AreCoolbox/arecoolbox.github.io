<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bouncy Snake - Hyper Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            overflow: hidden;
            touch-action: none;
            font-family: 'Press Start 2P', monospace;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Game states
        let gameState = 'playing'; 
        let score = 0;
        
        // World system centered at (0,0)
        let arena = {
            width: 500,
            height: 500
        };

        let camera = {
            x: 0,
            y: 0,
            ease: 0.1
        };

        function getPaleColor() {
            return `hsl(${Math.random() * 360}, 75%, 70%)`;
        }

        let snake = {
            segments: [],
            length: 20,
            radius: 10,
            x: 0,
            y: 0,
            angle: 0,
            speed: 5,
            baseSpeed: 5,
            color: getPaleColor()
        };

        let mouseX = 0;
        let mouseY = -100;
        let orbs = [];
        let particles = [];

        // Input Handling
        function updateTarget(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            // Keep track of raw screen coordinates
            mouseX = clientX;
            mouseY = clientY;
            
            if (gameState === 'gameover') resetGame();
        }
        
        window.addEventListener('mousemove', updateTarget);
        window.addEventListener('touchmove', updateTarget);
        window.addEventListener('touchstart', updateTarget);
        window.addEventListener('mousedown', () => { if(gameState === 'gameover') resetGame(); });

        function spawnParticle(x, y, color) {
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    radius: Math.random() * 3 + 2,
                    color: color,
                    alpha: 1,
                    decay: Math.random() * 0.03 + 0.02
                });
            }
        }

        function spawnOrb() {
            const buffer = 30;
            return {
                x: (Math.random() - 0.5) * (arena.width - buffer * 2),
                y: (Math.random() - 0.5) * (arena.height - buffer * 2),
                radius: 7,
                color: getPaleColor()
            };
        }

        function resetGame() {
            score = 0;
            arena.width = 550;
            arena.height = 550;
            snake.x = 0;
            snake.y = 0;
            snake.speed = snake.baseSpeed;
            snake.length = 20;
            snake.segments = [];
            for (let i = 0; i < snake.length; i++) {
                snake.segments.push({ x: 0, y: 0, color: getPaleColor() });
            }
            orbs = [spawnOrb(), spawnOrb(), spawnOrb()];
            particles = [];
            gameState = 'playing';
        }

        // Init
        resetGame();

        function gameLoop() {
            // Smooth background clearing
            ctx.fillStyle = '#141414';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // --- CAMERA CALCULATIONS ---
            // Center map on screen if it fits; otherwise track snake head smoothly
            let targetCamX = (arena.width > canvas.width) ? snake.x : 0;
            let targetCamY = (arena.height > canvas.height) ? snake.y : 0;
            
            camera.x += (targetCamX - camera.x) * camera.ease;
            camera.y += (targetCamY - camera.y) * camera.ease;

            // Translate mouse screen coordinates to modern world positions
            let worldMouseX = mouseX - canvas.width / 2 + camera.x;
            let worldMouseY = mouseY - canvas.height / 2 + camera.y;

            // --- START WORLD RENDERING (CAMERA SPACE) ---
            ctx.save();
            ctx.translate(canvas.width / 2 - camera.x, canvas.height / 2 - camera.y);

            let halfW = arena.width / 2;
            let halfH = arena.height / 2;

            // Draw Arena Grid System
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            for (let x = -halfW; x <= halfW; x += 40) {
                ctx.beginPath(); ctx.moveTo(x, -halfH); ctx.lineTo(x, halfH); ctx.stroke();
            }
            for (let y = -halfH; y <= halfH; y += 40) {
                ctx.beginPath(); ctx.moveTo(-halfW, y); ctx.lineTo(halfW, y); ctx.stroke();
            }

            // Draw Neon Arena Boundaries
            ctx.strokeStyle = '#ff3b30';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff3b30';
            ctx.lineWidth = 4;
            ctx.strokeRect(-halfW, -halfH, arena.width, arena.height);
            ctx.shadowBlur = 0; // Reset glow immediately for performance

            if (gameState === 'playing') {
                // Physics Steering Setup
                let dx = worldMouseX - snake.x;
                let dy = worldMouseY - snake.y;
                let distToTarget = Math.hypot(dx, dy);

                if (distToTarget > 10) {
                    let targetAngle = Math.atan2(dy, dx);
                    let angleDiff = targetAngle - snake.angle;
                    
                    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

                    snake.angle += angleDiff * 0.18;

                    // Uncapped structural speed accumulation
                    let straightLineBonus = (Math.abs(angleDiff) < 0.15) ? 0.05 : 0;
                    snake.speed += straightLineBonus;
                }

                // Move Snake Head
                snake.x += Math.cos(snake.angle) * snake.speed;
                snake.y += Math.sin(snake.angle) * snake.speed;

                // Infinite Uncapped Elastic Bouncing Core
                let bounced = false;
                if (snake.x - snake.radius < -halfW) {
                    snake.x = -halfW + snake.radius;
                    snake.angle = Math.PI - snake.angle;
                    bounced = true;
                } else if (snake.x + snake.radius > halfW) {
                    snake.x = halfW - snake.radius;
                    snake.angle = Math.PI - snake.angle;
                    bounced = true;
                }

                if (snake.y - snake.radius < -halfH) {
                    snake.y = -halfH + snake.radius;
                    snake.angle = -snake.angle;
                    bounced = true;
                } else if (snake.y + snake.radius > halfH) {
                    snake.y = halfH - snake.radius;
                    snake.angle = -snake.angle;
                    bounced = true;
                }

                if (bounced) {
                    // Elastic velocity jump logic (Bounciness scales directly with velocity)
                    snake.speed = Math.max(snake.speed, snake.baseSpeed) * 1.2;
                    spawnParticle(snake.x, snake.y, '#ffffff');
                }

                // Update Tail Position Tracking Matrices
                snake.segments.unshift({ x: snake.x, y: snake.y, color: snake.color });
                while (snake.segments.length > snake.length) {
                    snake.segments.pop();
                }

                // Self Collision Mechanics (Lenient start threshold based on body mass scale)
                for (let i = 35; i < snake.segments.length; i++) {
                    let seg = snake.segments[i];
                    let dist = Math.hypot(snake.x - seg.x, snake.y - seg.y);
                    if (dist < snake.radius * 0.8) {
                        gameState = 'gameover';
                        spawnParticle(snake.x, snake.y, '#ff3b30');
                    }
                }

                // Dynamic Balance Orb Generation Mechanics
                let targetOrbCount = 2 + Math.floor(score / 4);
                while (orbs.length < targetOrbCount) {
                    orbs.push(spawnOrb());
                }

                // Orb Intersection Calculations
                for (let i = orbs.length - 1; i >= 0; i--) {
                    let orb = orbs[i];
                    let distToOrb = Math.hypot(snake.x - orb.x, snake.y - orb.y);
                    
                    if (distToOrb < snake.radius + orb.radius) {
                        score += 1;
                        snake.length += 4;
                        snake.color = orb.color;
                        
                        spawnParticle(orb.x, orb.y, orb.color);

                        // Infinite map growth step parameters
                        arena.width += 60;
                        arena.height += 60;
                        
                        orbs.splice(i, 1);
                    }
                }
            }

            // Draw Processing Units - Orbs
            for (let orb of orbs) {
                ctx.beginPath();
                ctx.arc(orb.x, orb.y, orb.radius, 0, Math.PI * 2);
                ctx.fillStyle = orb.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = orb.color;
                ctx.fill();
            }
            ctx.shadowBlur = 0;

            // Draw Processing Units - Tapered Segmented Body
            for (let i = snake.segments.length - 1; i >= 0; i--) {
                let seg = snake.segments[i];
                // Smooth geometric trailing width distribution formula
                let scaleFactor = (1 - (i / snake.segments.length) * 0.6);
                let currentRadius = snake.radius * scaleFactor;

                ctx.beginPath();
                ctx.arc(seg.x, seg.y, currentRadius, 0, Math.PI * 2);
                ctx.fillStyle = seg.color;
                ctx.fill();
            }

            // Draw Processing Units - White Gloss Snake Head
            ctx.beginPath();
            ctx.arc(snake.x, snake.y, snake.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#ffffff';
            ctx.fill();
            ctx.shadowBlur = 0;

            // Draw Visual FX Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= p.decay;

                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.restore();
            }

            ctx.restore();
            // --- END WORLD RENDERING (SCREEN SPACE ONWARDS) ---

            // Draw HUD - Dynamic Scoreboard Tracker
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.textAlign = 'left';
            ctx.font = '20px "Press Start 2P", monospace';
            ctx.fillText(`SCORE: ${score}`, 25, 45);
            ctx.font = '12px "Press Start 2P", monospace';
            ctx.fillText(`SPEED: ${Math.round(snake.speed * 10)}`, 25, 75);

            // Draw Post-Processing State - Game Over Interface
            if (gameState === 'gameover') {
                ctx.fillStyle = 'rgba(10, 10, 10, 0.85)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#ff3b30';
                ctx.textAlign = 'center';
                ctx.font = '32px "Press Start 2P", monospace';
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 30);
                
                ctx.fillStyle = '#ffffff';
                ctx.font = '18px "Press Start 2P", monospace';
                ctx.fillText(`FINAL SCORE: ${score}`, canvas.width / 2, canvas.height / 2 + 20);

                ctx.fillStyle = '#888';
                ctx.font = '12px "Press Start 2P", monospace';
                ctx.fillText("TAP OR CLICK TO RESTART", canvas.width / 2, canvas.height / 2 + 70);
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
