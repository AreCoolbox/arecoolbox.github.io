<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bouncy Snake</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            overflow: hidden;
            touch-action: none;
            font-family: 'Press Start 2P', monospace;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Resize
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let gameState = 'playing'; // 'playing', 'gameover'
        let score = 0;
        
        let arena = {
            width: Math.min(canvas.width * 0.8, 500),
            height: Math.min(canvas.height * 0.8, 500)
        };

        function getPaleColor() {
            return `hsl(${Math.random() * 360}, 60%, 75%)`;
        }

        let snake = {
            segments: [],
            length: 15,
            radius: 8,
            x: canvas.width / 2,
            y: canvas.height / 2,
            angle: 0,
            speed: 0,
            baseSpeed: 4,
            maxSpeed: 8,
            bounceForce: 15, // Сила відскоку (дуже пружна)
            color: getPaleColor()
        };

        // Заповнюємо хвіст
        for (let i = 0; i < snake.length; i++) {
            snake.segments.push({ x: snake.x, y: snake.y, color: getPaleColor() });
        }

        let mouseX = snake.x;
        let mouseY = snake.y - 50;
        let orbs = [];

        function updateTarget(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            mouseX = clientX;
            mouseY = clientY;
            if (gameState === 'gameover') resetGame();
        }
        
        window.addEventListener('mousemove', updateTarget);
        window.addEventListener('touchmove', updateTarget);
        window.addEventListener('touchstart', updateTarget);
        window.addEventListener('mousedown', () => { if(gameState === 'gameover') resetGame(); });

        function spawnOrb() {
            const ax = (canvas.width - arena.width) / 2;
            const ay = (canvas.height - arena.height) / 2;
            return {
                x: ax + 20 + Math.random() * (arena.width - 40),
                y: ay + 20 + Math.random() * (arena.height - 40),
                radius: 6,
                color: getPaleColor()
            };
        }

        function resetGame() {
            score = 0;
            arena.width = Math.min(canvas.width * 0.8, 500);
            arena.height = Math.min(canvas.height * 0.8, 500);
            snake.x = canvas.width / 2;
            snake.y = canvas.height / 2;
            snake.speed = 0;
            snake.length = 15;
            snake.segments = [];
            for (let i = 0; i < snake.length; i++) {
                snake.segments.push({ x: snake.x, y: snake.y, color: getPaleColor() });
            }
            orbs = [spawnOrb()];
            gameState = 'playing';
        }

        // Початкова сфера
        orbs.push(spawnOrb());

        function gameLoop() {
            // Очищення фону
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const ax = (canvas.width - arena.width) / 2;
            const ay = (canvas.height - arena.height) / 2;

            // Малюємо сітку на фоні арени
            ctx.strokeStyle = '#2a2a2a';
            ctx.lineWidth = 1;
            for (let x = ax; x < ax + arena.width; x += 30) {
                ctx.beginPath(); ctx.moveTo(x, ay); ctx.lineTo(x, ay + arena.height); ctx.stroke();
            }
            for (let y = ay; y < ay + arena.height; y += 30) {
                ctx.beginPath(); ctx.moveTo(ax, y); ctx.lineTo(ax + arena.width, y); ctx.stroke();
            }

            // Малюємо кордони арени
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 3;
            ctx.strokeRect(ax, ay, arena.width, arena.height);

            if (gameState === 'playing') {
                // Логіка повороту і швидкості
                let dx = mouseX - snake.x;
                let dy = mouseY - snake.y;
                let distToMouse = Math.hypot(dx, dy);

                // Якщо миша/палець на голові - зупиняємось
                if (distToMouse < 15) {
                    snake.speed = snake.speed * 0.8; // Плавна зупинка
                } else {
                    let targetAngle = Math.atan2(dy, dx);
                    let angleDiff = targetAngle - snake.angle;
                    
                    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

                    snake.angle += angleDiff * 0.15;

                    // Прискорення по прямій
                    let targetSpeed = (Math.abs(angleDiff) < 0.2) ? snake.maxSpeed : snake.baseSpeed;
                    
                    // Якщо після відскоку швидкість велика, вона плавно падатиме до targetSpeed
                    if (snake.speed > targetSpeed) {
                        snake.speed -= 0.2; 
                    } else {
                        snake.speed += 0.2;
                    }
                }

                snake.x += Math.cos(snake.angle) * snake.speed;
                snake.y += Math.sin(snake.angle) * snake.speed;

                // ДУЖЕ пружні стіни (Bouncy borders)
                let bounced = false;
                if (snake.x - snake.radius < ax) {
                    snake.x = ax + snake.radius;
                    snake.angle = Math.PI - snake.angle;
                    bounced = true;
                } else if (snake.x + snake.radius > ax + arena.width) {
                    snake.x = ax + arena.width - snake.radius;
                    snake.angle = Math.PI - snake.angle;
                    bounced = true;
                }

                if (snake.y - snake.radius < ay) {
                    snake.y = ay + snake.radius;
                    snake.angle = -snake.angle;
                    bounced = true;
                } else if (snake.y + snake.radius > ay + arena.height) {
                    snake.y = ay + arena.height - snake.radius;
                    snake.angle = -snake.angle;
                    bounced = true;
                }

                if (bounced) {
                    snake.speed = snake.bounceForce; // Різкий ривок від удару
                    mouseX = snake.x + Math.cos(snake.angle) * 100;
                    mouseY = snake.y + Math.sin(snake.angle) * 100;
                }

                // Оновлення хвоста
                snake.segments.unshift({ x: snake.x, y: snake.y, color: snake.color });
                while (snake.segments.length > snake.length) {
                    snake.segments.pop();
                }

                // Перевірка смерті (Game Over)
                for (let i = 25; i < snake.segments.length; i++) {
                    let seg = snake.segments[i];
                    let dist = Math.hypot(snake.x - seg.x, snake.y - seg.y);
                    if (dist < snake.radius) {
                        gameState = 'gameover';
                    }
                }

                // Спавн додаткових сфер (1 додаткова кожні 5 очок)
                let maxOrbs = 1 + Math.floor(score / 5);
                while (orbs.length < maxOrbs) {
                    orbs.push(spawnOrb());
                }

                // Збирання сфер
                for (let i = orbs.length - 1; i >= 0; i--) {
                    let orb = orbs[i];
                    let distToOrb = Math.hypot(snake.x - orb.x, snake.y - orb.y);
                    
                    if (distToOrb < snake.radius + orb.radius) {
                        score += 1;
                        snake.length += 3;
                        snake.color = orb.color; // Змінюємо колір голови на колір з'їденої сфери
                        
                        arena.width = Math.min(arena.width + 30, canvas.width - 20);
                        arena.height = Math.min(arena.height + 30, canvas.height - 20);
                        
                        orbs.splice(i, 1);
                    }
                }
            }

            // Малювання сфер
            for (let orb of orbs) {
                ctx.beginPath();
                ctx.arc(orb.x, orb.y, orb.radius, 0, Math.PI * 2);
                ctx.fillStyle = orb.color;
                ctx.fill();
            }

            // Малювання хвоста (кожен сегмент має свій блідий колір)
            for (let i = snake.segments.length - 1; i >= 0; i--) {
                let seg = snake.segments[i];
                ctx.beginPath();
                ctx.arc(seg.x, seg.y, snake.radius * 0.9, 0, Math.PI * 2);
                ctx.fillStyle = seg.color;
                ctx.fill();
            }

            // Малювання голови
            ctx.beginPath();
            ctx.arc(snake.x, snake.y, snake.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();

            // Малювання Score
            ctx.fillStyle = '#ccc';
            ctx.textAlign = 'left';
            ctx.font = '24px "Press Start 2P", monospace';
            ctx.fillText(score, 20, 40);

            // Екран смерті
            if (gameState === 'gameover') {
                ctx.fillStyle = 'rgba(26, 26, 26, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                
                ctx.font = '36px "Press Start 2P", monospace';
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);
                
                ctx.font = '24px "Press Start 2P", monospace';
                ctx.fillText(score, canvas.width / 2, canvas.height / 2 + 30);
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
