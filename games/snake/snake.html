<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bouncy Snake - Ice Physics</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f6f8;
            overflow: hidden;
            touch-action: none;
            font-family: 'Press Start 2P', monospace;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let gameState = 'playing'; 
        let score = 0;
        
        let arena = { width: 600, height: 600 };
        let camera = { x: 0, y: 0, ease: 0.1 };

        function getPaleColor() {
            return `hsl(${Math.random() * 360}, 80%, 65%)`;
        }

        let snake = {
            segments: [],
            length: 20,
            radius: 12,
            x: 0,
            y: 0,
            angle: 0,
            speed: 0,
            maxSpeed: 12, // Increased max speed for the ice build-up
            color: getPaleColor()
        };

        let mouseX = 0;
        let mouseY = 0;
        let isTouching = false;
        
        let orbs = [];
        let particles = [];
        let ripples = [];

        function updateTarget(e) {
            if (e.touches && e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            } else if (e.clientX) {
                mouseX = e.clientX;
                mouseY = e.clientY;
            }
        }
        
        window.addEventListener('touchstart', (e) => {
            if (gameState === 'gameover') { resetGame(); return; }
            isTouching = true;
            updateTarget(e);
        }, {passive: false});
        
        window.addEventListener('touchmove', (e) => {
            if (isTouching) updateTarget(e);
        }, {passive: false});
        
        window.addEventListener('touchend', () => isTouching = false);
        window.addEventListener('touchcancel', () => isTouching = false);

        window.addEventListener('mousedown', (e) => {
            if (gameState === 'gameover') { resetGame(); return; }
            isTouching = true;
            updateTarget(e);
        });
        
        window.addEventListener('mousemove', (e) => {
            if (isTouching) updateTarget(e);
        });
        
        window.addEventListener('mouseup', () => isTouching = false);
        window.addEventListener('mouseleave', () => isTouching = false);

        function spawnParticle(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    radius: Math.random() * 4 + 2,
                    color: color,
                    alpha: 1,
                    decay: Math.random() * 0.04 + 0.02
                });
            }
        }

        function spawnRipple(x, y, color) {
            ripples.push({ x: x, y: y, radius: 5, color: color, alpha: 0.8 });
        }

        function spawnOrb() {
            const buffer = 40;
            return {
                x: (Math.random() - 0.5) * (arena.width - buffer * 2),
                y: (Math.random() - 0.5) * (arena.height - buffer * 2),
                radius: 8,
                color: getPaleColor(),
                offset: Math.random() * 100
            };
        }

        function resetGame() {
            score = 0;
            arena.width = 600;
            arena.height = 600;
            snake.x = 0;
            snake.y = 0;
            snake.speed = 0;
            snake.length = 20;
            snake.segments = [{ x: 0, y: 0, color: getPaleColor() }];
            
            orbs = [spawnOrb(), spawnOrb(), spawnOrb()];
            particles = [];
            ripples = [];
            isTouching = false;
            gameState = 'playing';
        }

        resetGame();

        function gameLoop() {
            ctx.fillStyle = '#f4f6f8';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let targetCamX = (arena.width > canvas.width) ? snake.x : 0;
            let targetCamY = (arena.height > canvas.height) ? snake.y : 0;
            camera.x += (targetCamX - camera.x) * camera.ease;
            camera.y += (targetCamY - camera.y) * camera.ease;

            let worldMouseX = mouseX - canvas.width / 2 + camera.x;
            let worldMouseY = mouseY - canvas.height / 2 + camera.y;

            ctx.save();
            ctx.translate(canvas.width / 2 - camera.x, canvas.height / 2 - camera.y);

            let halfW = arena.width / 2;
            let halfH = arena.height / 2;

            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1;
            for (let x = -halfW; x <= halfW; x += 40) {
                ctx.beginPath(); ctx.moveTo(x, -halfH); ctx.lineTo(x, halfH); ctx.stroke();
            }
            for (let y = -halfH; y <= halfH; y += 40) {
                ctx.beginPath(); ctx.moveTo(-halfW, y); ctx.lineTo(halfW, y); ctx.stroke();
            }

            ctx.strokeStyle = '#cbd5e1';
            ctx.lineWidth = 6;
            ctx.strokeRect(-halfW, -halfH, arena.width, arena.height);

            if (gameState === 'playing') {
                
                // --- NEW ICE PHYSICS LOGIC ---
                if (isTouching) {
                    let dx = worldMouseX - snake.x;
                    let dy = worldMouseY - snake.y;
                    let distToTarget = Math.hypot(dx, dy);

                    if (distToTarget > 10) {
                        let targetAngle = Math.atan2(dy, dx);
                        let angleDiff = targetAngle - snake.angle;
                        
                        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

                        // Slower turn speed for harder handling
                        snake.angle += angleDiff * 0.12; 

                        // 1. Slow down when turning (sharper turn = more speed lost)
                        let turnSeverity = Math.abs(angleDiff);
                        snake.speed *= (1 - turnSeverity * 0.06); 

                        // 2. Speed up when going straight
                        snake.speed += 0.35; // Acceleration force
                        if (snake.speed > snake.maxSpeed) {
                            snake.speed = snake.maxSpeed;
                        }
                    }
                } else {
                    // 3. Stop like ice (low friction gliding)
                    snake.speed *= 0.96; 
                }

                // Prevent the speed from hovering at microscopic floating point decimals
                if (Math.abs(snake.speed) < 0.1) {
                    snake.speed = 0;
                }

                snake.x += Math.cos(snake.angle) * snake.speed;
                snake.y += Math.sin(snake.angle) * snake.speed;

                // --- WALL COLLISION ---
                let bounced = false;
                if (snake.x - snake.radius < -halfW) {
                    snake.x = -halfW + snake.radius;
                    snake.angle = Math.PI - snake.angle;
                    bounced = true;
                } else if (snake.x + snake.radius > halfW) {
                    snake.x = halfW - snake.radius;
                    snake.angle = Math.PI - snake.angle;
                    bounced = true;
                }

                if (snake.y - snake.radius < -halfH) {
                    snake.y = -halfH + snake.radius;
                    snake.angle = -snake.angle;
                    bounced = true;
                } else if (snake.y + snake.radius > halfH) {
                    snake.y = halfH - snake.radius;
                    snake.angle = -snake.angle;
                    bounced = true;
                }

                if (bounced) {
                    // 4. Knockback at 1/2 speed
                    snake.speed *= 0.5; 
                    spawnParticle(snake.x, snake.y, snake.color);
                    spawnRipple(snake.x, snake.y, snake.color);
                }

                // --- SEGMENT LOGIC ---
                let lastSeg = snake.segments[0];
                if (!lastSeg || Math.hypot(snake.x - lastSeg.x, snake.y - lastSeg.y) >= 4) {
                    snake.segments.unshift({ x: snake.x, y: snake.y, color: snake.color });
                    if (snake.segments.length > snake.length) {
                        snake.segments.pop();
                    }
                }

                // --- SELF COLLISION ---
                if (snake.speed > 1) {
                    for (let i = 15; i < snake.segments.length; i++) {
                        let seg = snake.segments[i];
                        if (Math.hypot(snake.x - seg.x, snake.y - seg.y) < snake.radius * 0.7) {
                            gameState = 'gameover';
                            spawnParticle(snake.x, snake.y, '#ff3b30');
                            spawnRipple(snake.x, snake.y, '#ff3b30');
                        }
                    }
                }

                // --- ORB COLLECTION ---
                let targetOrbCount = 2 + Math.floor(score / 5);
                while (orbs.length < targetOrbCount) orbs.push(spawnOrb());

                for (let i = orbs.length - 1; i >= 0; i--) {
                    let orb = orbs[i];
                    if (Math.hypot(snake.x - orb.x, snake.y - orb.y) < snake.radius + orb.radius) {
                        score += 1;
                        snake.length += 5;
                        snake.color = orb.color;
                        
                        spawnParticle(orb.x, orb.y, orb.color);
                        spawnRipple(orb.x, orb.y, orb.color);

                        arena.width += 50;
                        arena.height += 50;
                        orbs.splice(i, 1);
                    }
                }
            }

            // --- RENDERING ---
            for (let i = ripples.length - 1; i >= 0; i--) {
                let r = ripples[i];
                r.radius += 4;
                r.alpha -= 0.04;
                if (r.alpha <= 0) {
                    ripples.splice(i, 1);
                } else {
                    ctx.beginPath();
                    ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = r.color;
                    ctx.globalAlpha = r.alpha;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }
            }

            let time = Date.now() * 0.005;
            for (let orb of orbs) {
                let pulse = Math.sin(time + orb.offset) * 2;
                ctx.beginPath();
                ctx.arc(orb.x, orb.y, orb.radius + pulse, 0, Math.PI * 2);
                ctx.fillStyle = orb.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = orb.color;
                ctx.fill();
            }
            ctx.shadowBlur = 0;

            for (let i = snake.segments.length - 1; i >= 0; i--) {
                let seg = snake.segments[i];
                let scaleFactor = (1 - (i / snake.segments.length) * 0.5);
                let currentRadius = snake.radius * scaleFactor;

                ctx.beginPath();
                ctx.arc(seg.x, seg.y, currentRadius, 0, Math.PI * 2);
                ctx.fillStyle = seg.color;
                ctx.fill();
                
                ctx.strokeStyle = 'rgba(0,0,0,0.05)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            ctx.beginPath();
            ctx.arc(snake.x, snake.y, snake.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.strokeStyle = snake.color;
            ctx.lineWidth = 3;
            ctx.stroke();

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.95; 
                p.vy *= 0.95;
                p.alpha -= p.decay;

                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                ctx.globalAlpha = p.alpha;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            ctx.restore();

            ctx.fillStyle = '#334155';
            ctx.textAlign = 'left';
            ctx.font = '20px "Press Start 2P", monospace';
            ctx.fillText(`SCORE: ${score}`, 25, 45);

            if (gameState === 'gameover') {
                ctx.fillStyle = 'rgba(244, 246, 248, 0.85)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#ff3b30';
                ctx.textAlign = 'center';
                ctx.font = '32px "Press Start 2P", monospace';
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 30);
                
                ctx.fillStyle = '#334155';
                ctx.font = '18px "Press Start 2P", monospace';
                ctx.fillText(`FINAL SCORE: ${score}`, canvas.width / 2, canvas.height / 2 + 20);

                ctx.fillStyle = '#94a3b8';
                ctx.font = '12px "Press Start 2P", monospace';
                ctx.fillText("TAP OR CLICK TO RESTART", canvas.width / 2, canvas.height / 2 + 70);
            }

            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
