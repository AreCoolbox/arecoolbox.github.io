<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bouncy Snake</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; touch-action: none; font-family: 'Press Start 2P', monospace; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameState = 'playing', score = 0;
        let arena = { width: 400, height: 400 };
        let cam = { x: 0, y: 0 };

        let snake = {
            segments: [], length: 15, radius: 8,
            x: 200, y: 200, angle: 0, speed: 0,
            color: '#d1d1d1'
        };

        function getPaleColor() { return `hsl(${Math.random() * 360}, 40%, 70%)`; }
        
        function resetGame() {
            score = 0; arena = { width: 400, height: 400 };
            snake.x = 200; snake.y = 200; snake.speed = 0; snake.length = 15;
            snake.segments = Array(15).fill().map(() => ({ x: 200, y: 200, color: getPaleColor() }));
            orbs = [spawnOrb()]; gameState = 'playing';
        }

        function spawnOrb() {
            return { x: Math.random() * arena.width, y: Math.random() * arena.height, color: getPaleColor() };
        }

        let orbs = [spawnOrb()], mouse = { x: 200, y: 150 };

        window.addEventListener('mousemove', (e) => { mouse = { x: e.clientX, y: e.clientY }; });
        window.addEventListener('touchmove', (e) => { mouse = { x: e.touches[0].clientX, y: e.touches[0].clientY }; });
        window.addEventListener('mousedown', () => { if(gameState === 'gameover') resetGame(); });

        function gameLoop() {
            ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameState === 'playing') {
                let dx = mouse.x - (snake.x - cam.x), dy = mouse.y - (snake.y - cam.y);
                if (Math.hypot(dx, dy) < 20) { snake.speed *= 0.9; } 
                else {
                    snake.angle += (Math.atan2(dy, dx) - snake.angle) * 0.1;
                    snake.speed += 0.15; // Постійне прискорення
                }
                snake.x += Math.cos(snake.angle) * snake.speed;
                snake.y += Math.sin(snake.angle) * snake.speed;

                // Bouncy borders (1.2x boost)
                if (snake.x < 0 || snake.x > arena.width) { snake.angle = Math.PI - snake.angle; snake.speed *= 1.2; snake.x = Math.max(0, Math.min(snake.x, arena.width)); }
                if (snake.y < 0 || snake.y > arena.height) { snake.angle = -snake.angle; snake.speed *= 1.2; snake.y = Math.max(0, Math.min(snake.y, arena.height)); }

                // Camera follow
                cam.x = (canvas.width / 2) - snake.x;
                cam.y = (canvas.height / 2) - snake.y;

                snake.segments.unshift({ x: snake.x, y: snake.y, color: getPaleColor() });
                if (snake.segments.length > snake.length) snake.segments.pop();

                orbs.forEach((o, i) => {
                    if (Math.hypot(snake.x - o.x, snake.y - o.y) < 20) {
                        score++; snake.length += 3; orbs.splice(i, 1);
                        arena.width += 20; arena.height += 20;
                        if(score % 5 === 0) orbs.push(spawnOrb());
                    }
                });
                if(orbs.length === 0) orbs.push(spawnOrb());

                // Check self-collision
                for(let i=20; i<snake.segments.length; i++) if(Math.hypot(snake.x - snake.segments[i].x, snake.y - snake.segments[i].y) < 10) gameState = 'gameover';
            }

            // Draw
            ctx.save();
            ctx.translate(cam.x, cam.y);
            ctx.strokeStyle = '#333'; ctx.strokeRect(0, 0, arena.width, arena.height);
            orbs.forEach(o => { ctx.fillStyle = o.color; ctx.beginPath(); ctx.arc(o.x, o.y, 8, 0, 7); ctx.fill(); });
            snake.segments.forEach(s => { ctx.fillStyle = s.color; ctx.beginPath(); ctx.arc(s.x, s.y, 8, 0, 7); ctx.fill(); });
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(snake.x, snake.y, 8, 0, 7); ctx.fill();
            ctx.restore();

            ctx.fillStyle = '#fff'; ctx.font = '20px "Press Start 2P"'; ctx.fillText(score, 20, 40);
            if (gameState === 'gameover') ctx.fillText("GAME OVER", canvas.width/2 - 100, canvas.height/2);
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
